spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Auth (sem autenticação)
        - id: auth-login
          uri: ${USER_SERVICE_URL}
          predicates:
            - Path=/api/auth/login
            - Method=POST
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /auth/${segment}

        - id: auth-register
          uri: ${USER_SERVICE_URL}
          predicates:
            - Path=/api/auth/register
            - Method=POST
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /auth/${segment}

        # User Service
        - id: user-service
          uri: ${USER_SERVICE_URL}
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /users/${segment}
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/users

        # Bank Account Service
        - id: bank-account-service
          uri: ${BANK_ACCOUNT_SERVICE_URL}
          predicates:
            - Path=/api/accounts/**
          filters:
            - RewritePath=/api/accounts/(?<segment>.*), /accounts/${segment}
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: bankAccountCircuitBreaker
                fallbackUri: forward:/fallback/accounts

        # Transfer Service
        - id: transfer-service
          uri: ${TRANSFER_SERVICE_URL}
          predicates:
            - Path=/api/transfers/**
          filters:
            - RewritePath=/api/transfers/(?<segment>.*), /transfers/${segment}
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: transferServiceCircuitBreaker
                fallbackUri: forward:/fallback/transfers

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

logging:
  level:
    root: INFO
    com.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Redis (opcional - para rate limiting futuro)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}

# URLs dos Microserviços
services:
  user:
    url: ${USER_SERVICE_URL:http://user-service:8081}
  bank-account:
    url: ${BANK_ACCOUNT_SERVICE_URL:http://bank-account-service:8082}
  transfer:
    url: ${TRANSFER_SERVICE_URL:http://transfer-service:8083}
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
  fraud:
    url: ${FRAUD_SERVICE_URL:http://fraud-service:8085}

# Swagger/OpenAPI
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.gateway: DEBUG
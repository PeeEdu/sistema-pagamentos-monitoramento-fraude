server:
  port: ${SERVER_PORT:8081}  # ✅ Mudei para 8081 (Gateway usa 8080)

spring:
  application:
    name: user-service

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://admin:admin123@localhost:27017/user_db?authSource=admin}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# ==================== JWT Configuration ====================
jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-to-work-properly-in-production-environment}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 horas em milissegundos
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 dias

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

# Tópicos Kafka
kafka:
  topics:
    user-created: ${KAFKA_TOPIC_USER_CREATED:user-created-topic}
    user-updated: ${KAFKA_TOPIC_USER_UPDATED:user-updated-topic}
    user-deleted: ${KAFKA_TOPIC_USER_DELETED:user-deleted-topic}

# Logging
logging:
  level:
    root: INFO
    org.springframework.kafka: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
    com.user: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
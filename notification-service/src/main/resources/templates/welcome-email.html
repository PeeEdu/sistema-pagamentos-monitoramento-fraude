<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo ao NexBank</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #1a1a1a; color: #ffffff; padding-top: 80px">
<div style="max-width: 600px; margin: 0 auto; background-color: #2a2a2a; border-radius: 8px; overflow: hidden;">

    <!-- Header -->
    <div style="background: linear-gradient(135deg, #f39c12, #e67e22); padding: 40px 20px; text-align: center;">
        <h1 style="margin: 0; font-size: 48px; font-weight: bold; color: #1a1a1a;">
            NexBank
        </h1>
        <p style="margin: 10px 0 0 0; font-size: 18px; color: #1a1a1a; opacity: 0.8;">
            Seu banco digital
        </p>
    </div>

    <!-- Content -->
    <div style="padding: 40px 30px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #f39c12; font-size: 32px; margin: 0 0 10px 0;">
                Bem-vindo!
            </h2>
            <p style="font-size: 18px; color: #cccccc; margin: 0;">
                Olá <strong style="color: #f39c12;" th:text="${name}">Nome</strong>
            </p>
        </div>

        <div style="background-color: #333333; border-radius: 8px; padding: 30px; margin: 30px 0; border-left: 4px solid #f39c12;">
            <h3 style="color: #f39c12; margin: 0 0 15px 0; font-size: 20px;">
                Sua conta foi criada com sucesso!
            </h3>
            <p style="color: #cccccc; line-height: 1.6; margin: 0;">
                Agora você faz parte da família NexBank. Desfrute de todos os nossos serviços bancários digitais com segurança e praticidade.
            </p>
        </div>
    </div>

    <!-- Footer -->
    <div style="background-color: #1a1a1a; padding: 30px 30px 80px 30px; text-align: center; border-top: 1px solid #333333;">
        <p style="color: #888888; font-size: 14px; margin: 0 0 10px 0;">
            Este email foi enviado automaticamente.
        </p>
        <div style="margin-top: 20px;">
            <span style="color: #f39c12; font-size: 18px; font-weight: bold;">NexBank</span>
            <span style="color: #888888; font-size: 12px; margin-left: 10px;">- Seu banco digital</span>
        </div>
    </div>
</div>
</body>
</html>

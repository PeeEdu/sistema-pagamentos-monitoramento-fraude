server:
  port: 8081

spring:
  application:
    name: notification-service

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://admin:admin123@localhost:27017/notification_db?authSource=admin}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.bank_account.notificationservice.event.UserCreatedEvent

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}  # ⚠️ NUNCA commite senha real!
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Tópicos Kafka
kafka:
  topics:
    user-created: ${KAFKA_TOPIC_USER_CREATED:user-created-topic}
    transaction-notification: ${KAFKA_TOPIC_TRANSACTION_NOTIFICATION:transaction-notification-topic}

logging:
  level:
    root: INFO
    org.springframework.kafka: DEBUG
    com.bank_account: DEBUG
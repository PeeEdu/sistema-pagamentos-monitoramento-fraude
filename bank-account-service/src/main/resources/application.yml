server:
  port: 8080

spring:
  application:
    name: user-service

  # MongoDB (NÃO PostgreSQL!)
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://admin:admin123@localhost:27017/bank-account_db?authSource=admin}

  # Desabilitar auto-configuração JPA

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    kafka:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      consumer:
        group-id: bank-account-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

# Tópicos Kafka
kafka:
  topics:
    bank-account-created: ${KAFKA_TOPIC_BANK_ACCOUNT_CREATED:bank-account-created-topic}

# Logging
logging:
  level:
    root: INFO
    org.springframework.kafka: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.mongodb: DEBUG
    com.bank_account: DEBUG